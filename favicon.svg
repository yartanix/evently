/* ═══════════════════════════════════
   N8N WEBHOOK CONFIGURATION
   ═══════════════════════════════════ */
const WEBHOOKS = {
  registration: "https://yartanix.app.n8n.cloud/webhook/evently-registration",
  quoteRequest: "https://yartanix.app.n8n.cloud/webhook/evently-quote-request",
  eventStatus:  "https://yartanix.app.n8n.cloud/webhook/evently-event-status",
};

async function triggerWebhook(url, payload) {
  try {
    await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
  } catch (e) {
    console.warn("Webhook error:", e);
  }
}

