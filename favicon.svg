/* ═══════════════════════════════════
   SHARED COMPONENTS
   ═══════════════════════════════════ */
const Input = ({ label, value, onChange, type="text", placeholder, icon, error, dir }) => (
  <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
    {label && <label style={{ fontSize:12, color:C.textMuted, fontWeight:500, letterSpacing:"0.05em", textTransform:"uppercase" }}>{label}</label>}
    <div style={{ position:"relative" }}>
      {icon && <span style={{ position:"absolute", left:14, top:"50%", transform:"translateY(-50%)", fontSize:16 }}>{icon}</span>}
      <input
        type={type} value={value} onChange={onChange} placeholder={placeholder} dir={dir}
        style={{
          width:"100%", padding: icon ? "12px 14px 12px 42px" : "12px 16px",
          background:C.surfaceHi, border:`1px solid ${error ? C.error : C.border}`,
          borderRadius:10, color:C.text, fontSize:14,
          transition:"border 0.2s",
        }}
        onFocus={e=>e.target.style.borderColor=C.accent}
        onBlur={e=>e.target.style.borderColor=error?C.error:C.border}
      />
    </div>
    {error && <span style={{ fontSize:11, color:C.error }}>{error}</span>}
  </div>
);

const Btn = ({ children, onClick, variant="primary", disabled, loading, style:s={} }) => (
  <button onClick={onClick} disabled={disabled||loading}
    style={{
      padding:"13px 28px", borderRadius:12, fontWeight:600, fontSize:14,
      transition:"all 0.2s", letterSpacing:"0.02em",
      background: variant==="primary" ? C.accent : "transparent",
      color: variant==="primary" ? "#0a0a0f" : C.textMuted,
      border: variant==="ghost" ? `1px solid ${C.border}` : "none",
      opacity: disabled||loading ? 0.6 : 1,
      cursor: disabled||loading ? "not-allowed" : "pointer",
      ...s
    }}>
    {loading ? "⏳ " : ""}{children}
  </button>
);

const Toast = ({ msg, type="success" }) => (
  <div style={{
    position:"fixed", bottom:28, left:"50%", transform:"translateX(-50%)",
    background: type==="success" ? C.success : C.error,
    color:"#fff", padding:"12px 24px", borderRadius:12, fontWeight:600,
    fontSize:14, zIndex:9999, animation:"fadeUp 0.3s ease",
    boxShadow:"0 8px 32px rgba(0,0,0,0.4)"
  }}>{msg}</div>
);

