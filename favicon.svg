function UserRegisterScreen({ onBack, onSuccess }) {
  const { lang } = useLang();
  const [step,setStep] = useState(1);
  const [form,setForm] = useState({ name:"", email:"", phone:"", city:"", password:"", confirm:"" });
  const [loading,setLoading] = useState(false);
  const [toast,setToast] = useState(null);
  const u = (k,v) => setForm(f=>({...f,[k]:v}));

  const submit = async () => {
    setLoading(true);
    await triggerWebhook(WEBHOOKS.registration, {
      name: form.name, email: form.email, phone: form.phone,
      city: form.city, role: "user",
      registeredAt: new Date().toISOString(),
    });
    setLoading(false);
    setToast({ msg: L(T.successReg, lang), type:"success" });
    setTimeout(() => onSuccess({ name:form.name, email:form.email, role:"user", city:form.city }), 1500);
  };

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
      {toast && <Toast msg={toast.msg} type={toast.type} />}
      <div style={{ width:"100%", maxWidth:440, animation:"fadeUp 0.5s ease" }}>
        <button onClick={onBack} style={{ background:"none", color:C.textMuted, fontSize:13, marginBottom:24, padding:0 }}>← {L(T.back,lang)}</button>
        {/* Step indicator */}
        <div style={{ display:"flex", gap:8, marginBottom:28 }}>
          {[1,2].map(s=>(
            <div key={s} style={{ flex:1, height:3, borderRadius:2, background: s<=step ? C.accent : C.border, transition:"background 0.3s" }} />
          ))}
        </div>
        <div style={{ fontSize:26, fontFamily:"'Cormorant Garamond',serif", fontWeight:700, marginBottom:24 }}>
          {step===1 ? L({en:"Account Details",ar:"بيانات الحساب"},lang) : L({en:"Personal Info",ar:"المعلومات الشخصية"},lang)}
        </div>
        {step===1 ? (
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <Input label={L(T.email,lang)} value={form.email} onChange={e=>u("email",e.target.value)} type="email" icon="✉️" />
            <Input label={L(T.password,lang)} value={form.password} onChange={e=>u("password",e.target.value)} type="password" icon="🔒" />
            <Input label={L(T.confirmPassword,lang)} value={form.confirm} onChange={e=>u("confirm",e.target.value)} type="password" icon="🔒" />
            <Btn onClick={()=>setStep(2)} style={{ width:"100%", marginTop:8, padding:"15px" }}>{L(T.next,lang)}</Btn>
          </div>
        ) : (
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <Input label={L(T.fullName,lang)} value={form.name} onChange={e=>u("name",e.target.value)} icon="👤" />
            <Input label={L(T.phone,lang)} value={form.phone} onChange={e=>u("phone",e.target.value)} icon="📱" />
            <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
              <label style={{ fontSize:12, color:C.textMuted, fontWeight:500, letterSpacing:"0.05em", textTransform:"uppercase" }}>{L(T.city,lang)}</label>
              <select value={form.city} onChange={e=>u("city",e.target.value)}
                style={{ padding:"12px 16px", background:C.surfaceHi, border:`1px solid ${C.border}`, borderRadius:10, color:form.city?C.text:C.textMuted, fontSize:14 }}>
                <option value="">{L({en:"Select city",ar:"اختر المدينة"},lang)}</option>
                {CITIES.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <Btn onClick={submit} loading={loading} style={{ width:"100%", marginTop:8, padding:"15px" }}>{L(T.createAccount,lang)}</Btn>
          </div>
        )}
      </div>
    </div>
  );
}

function SupplierRegisterScreen({ onBack, onSuccess }) {
  const { lang } = useLang();
  const [step,setStep] = useState(1);
  const [form,setForm] = useState({ businessName:"", crNumber:"", contactPerson:"", phone:"", city:"", serviceTypes:[], bio:"", email:"", password:"", confirm:"" });
  const [loading,setLoading] = useState(false);
  const [toast,setToast] = useState(null);
  const u = (k,v) => setForm(f=>({...f,[k]:v}));

  const toggleService = (s) => {
    setForm(f=>({ ...f, serviceTypes: f.serviceTypes.includes(s) ? f.serviceTypes.filter(x=>x!==s) : [...f.serviceTypes,s] }));
  };

  const submit = async () => {
    setLoading(true);
    await triggerWebhook(WEBHOOKS.registration, {
      name: form.contactPerson, email: form.email, phone: form.phone,
      city: form.city, role: "supplier",
      businessName: form.businessName, crNumber: form.crNumber,
      serviceTypes: form.serviceTypes.join(", "),
      registeredAt: new Date().toISOString(),
    });
    setLoading(false);
    setToast({ msg: L(T.successReg, lang), type:"success" });
    setTimeout(() => onSuccess({ name:form.contactPerson, email:form.email, role:"supplier", businessName:form.businessName, city:form.city }), 1500);
  };

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:24, overflowY:"auto" }}>
      {toast && <Toast msg={toast.msg} type={toast.type} />}
      <div style={{ width:"100%", maxWidth:500, animation:"fadeUp 0.5s ease", paddingTop:24, paddingBottom:24 }}>
        <button onClick={onBack} style={{ background:"none", color:C.textMuted, fontSize:13, marginBottom:24, padding:0 }}>← {L(T.back,lang)}</button>
        <div style={{ display:"flex", gap:8, marginBottom:28 }}>
          {[1,2,3].map(s=>(
            <div key={s} style={{ flex:1, height:3, borderRadius:2, background: s<=step ? C.accent : C.border, transition:"background 0.3s" }} />
          ))}
        </div>
        <div style={{ fontSize:26, fontFamily:"'Cormorant Garamond',serif", fontWeight:700, marginBottom:24 }}>
          {step===1 ? L({en:"Business Info",ar:"معلومات المنشأة"},lang) : step===2 ? L({en:"Services",ar:"الخدمات"},lang) : L({en:"Account Setup",ar:"إعداد الحساب"},lang)}
        </div>

        {step===1 && (
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <Input label={L(T.businessName,lang)} value={form.businessName} onChange={e=>u("businessName",e.target.value)} icon="🏢" />
            <Input label={L(T.crNumber,lang)} value={form.crNumber} onChange={e=>u("crNumber",e.target.value)} icon="📋" />
            <Input label={L(T.contactPerson,lang)} value={form.contactPerson} onChange={e=>u("contactPerson",e.target.value)} icon="👤" />
            <Input label={L(T.phone,lang)} value={form.phone} onChange={e=>u("phone",e.target.value)} icon="📱" />
            <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
              <label style={{ fontSize:12, color:C.textMuted, fontWeight:500, letterSpacing:"0.05em", textTransform:"uppercase" }}>{L(T.city,lang)}</label>
              <select value={form.city} onChange={e=>u("city",e.target.value)}
                style={{ padding:"12px 16px", background:C.surfaceHi, border:`1px solid ${C.border}`, borderRadius:10, color:form.city?C.text:C.textMuted, fontSize:14 }}>
                <option value="">{L({en:"Select city",ar:"اختر المدينة"},lang)}</option>
                {CITIES.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <Btn onClick={()=>setStep(2)} style={{ width:"100%", marginTop:8, padding:"15px" }}>{L(T.next,lang)}</Btn>
          </div>
        )}

        {step===2 && (
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <div>
              <label style={{ fontSize:12, color:C.textMuted, fontWeight:500, letterSpacing:"0.05em", textTransform:"uppercase", display:"block", marginBottom:10 }}>{L(T.serviceTypes,lang)}</label>
              <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                {SERVICE_TYPES.map(s=>{
                  const sel = form.serviceTypes.includes(s);
                  return (
                    <div key={s} onClick={()=>toggleService(s)}
                      style={{ padding:"7px 14px", borderRadius:20, fontSize:12, fontWeight:500, cursor:"pointer", transition:"all 0.2s",
                        background: sel ? C.accent : C.surfaceHi,
                        color: sel ? "#0a0a0f" : C.textMuted,
                        border:`1px solid ${sel ? C.accent : C.border}` }}>
                      {s}
                    </div>
                  );
                })}
              </div>
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
              <label style={{ fontSize:12, color:C.textMuted, fontWeight:500, letterSpacing:"0.05em", textTransform:"uppercase" }}>{L(T.bio,lang)}</label>
              <textarea value={form.bio} onChange={e=>u("bio",e.target.value)} rows={4}
                style={{ padding:"12px 16px", background:C.surfaceHi, border:`1px solid ${C.border}`, borderRadius:10, color:C.text, fontSize:14, resize:"vertical" }} />
            </div>
            <div style={{ display:"flex", gap:12 }}>
              <Btn onClick={()=>setStep(1)} variant="ghost" style={{ flex:1, padding:"15px" }}>{L(T.back,lang)}</Btn>
              <Btn onClick={()=>setStep(3)} style={{ flex:2, padding:"15px" }}>{L(T.next,lang)}</Btn>
            </div>
          </div>
        )}

        {step===3 && (
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <Input label={L(T.email,lang)} value={form.email} onChange={e=>u("email",e.target.value)} type="email" icon="✉️" />
            <Input label={L(T.password,lang)} value={form.password} onChange={e=>u("password",e.target.value)} type="password" icon="🔒" />
            <Input label={L(T.confirmPassword,lang)} value={form.confirm} onChange={e=>u("confirm",e.target.value)} type="password" icon="🔒" />
            <div style={{ display:"flex", gap:12, marginTop:8 }}>
              <Btn onClick={()=>setStep(2)} variant="ghost" style={{ flex:1, padding:"15px" }}>{L(T.back,lang)}</Btn>
              <Btn onClick={submit} loading={loading} style={{ flex:2, padding:"15px" }}>{L(T.createAccount,lang)}</Btn>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════
   MAIN APP PAGES
   ═══════════════════════════════════ */
function HomePage({ setPage, setSelectedProvider }) {
  const { lang } = useLang();
  const [search,setSearch] = useState("");
  const filtered = PROVIDERS.filter(p =>
    !search || p.name.toLowerCase().includes(search.toLowerCase()) || p.type.toLowerCase().includes(search.toLowerCase())
  );
  return (
    <div style={{ padding:"0 32px 60px" }}>
      {/* Hero */}
      <div style={{ textAlign:"center", padding:"80px 0 56px", background:`radial-gradient(ellipse at 50% -20%, ${C.accentDim} 0%, transparent 70%)` }}>
        <div style={{ fontSize:56, fontFamily:"'Cormorant Garamond',serif", fontWeight:700, lineHeight:1.1, marginBottom:16 }}>
          {L({en:"Your Event,",ar:"مناسبتك،"},lang)}<br/>
          <span style={{ color:C.accent }}>{L({en:"Perfected",ar:"بإتقان"},lang)}</span>
        </div>
        <div style={{ fontSize:16, color:C.textMuted, maxWidth:480, margin:"0 auto 36px" }}>
          {L({en:"Connect with premium providers and plan every detail — from concept to celebration.",ar:"تواصل مع أفضل مزودي الخدمات وخطّط لكل تفصيلة."},lang)}
        </div>
        <div style={{ position:"relative", maxWidth:520, margin:"0 auto" }}>
          <span style={{ position:"absolute", left:18, top:"50%", transform:"translateY(-50%)", fontSize:18 }}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder={L({en:"Search venues, caterers, photographers...",ar:"ابحث عن قاعات، تموين، مصورين..."},lang)}
            style={{ width:"100%", padding:"16px 18px 16px 52px", background:C.surface, border:`1px solid ${C.border}`, borderRadius:14, color:C.text, fontSize:15 }} />
        </div>
      </div>

      {/* Categories */}
      <div style={{ marginBottom:48 }}>
        <div style={{ display:"flex", flexWrap:"wrap", gap:10, justifyContent:"center" }}>
          {EVENT_TYPES.map(e=>(
            <div key={e.en} style={{ padding:"10px 20px", background:C.surface, border:`1px solid ${C.border}`, borderRadius:24, fontSize:13, fontWeight:500, cursor:"pointer", transition:"all 0.2s", display:"flex", alignItems:"center", gap:8 }}
              onMouseEnter={e2=>{e2.currentTarget.style.borderColor=C.accent;e2.currentTarget.style.color=C.accent;}}
              onMouseLeave={e2=>{e2.currentTarget.style.borderColor=C.border;e2.currentTarget.style.color=C.text;}}>
              <span>{e.icon}</span><span>{lang==="ar"?e.ar:e.en}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Providers Grid */}
      <div style={{ fontSize:22, fontFamily:"'Cormorant Garamond',serif", fontWeight:700, marginBottom:24 }}>
        {L({en:"Featured Providers",ar:"مزودو الخدمات المميزون"},lang)}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))", gap:20 }}>
        {filtered.map(p=>(
          <div key={p.id} onClick={()=>{setSelectedProvider(p);setPage("provider-detail");}}
            style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:16, padding:20, cursor:"pointer", transition:"all 0.2s" }}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=C.accent;e.currentTarget.style.transform="translateY(-2px)";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.transform="none";}}>
            <div style={{ fontSize:36, marginBottom:12 }}>{p.avatar}</div>
            <div style={{ fontWeight:600, fontSize:16, marginBottom:4 }}>{p.name}</div>
            <div style={{ fontSize:12, color:C.accent, marginBottom:8 }}>{p.type} · {p.location}</div>
            <div style={{ fontSize:13, color:C.textMuted, marginBottom:12 }}>⭐ {p.rating} ({p.reviews}) · {p.price}</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
              {p.tags.map(t=>(
                <span key={t} style={{ padding:"3px 10px", background:C.surfaceHi, borderRadius:12, fontSize:11, color:C.textMuted }}>{t}</span>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ProviderDetailPage({ provider, setPage, user }) {
  const { lang } = useLang();
  const [loading,setLoading] = useState(false);
  const [toast,setToast] = useState(null);
  const [form,setForm] = useState({ eventType:"", eventDate:"", guestCount:"", budget:"", message:"" });
  const u = (k,v) => setForm(f=>({...f,[k]:v}));

  const sendQuote = async () => {
    setLoading(true);
    await triggerWebhook(WEBHOOKS.quoteRequest, {
      userName: user?.name || "Guest",
      userEmail: user?.email || "",
      userPhone: user?.phone || "",
      supplierName: provider.name,
      supplierEmail: provider.email,
      supplierPhone: provider.phone,
      eventType: form.eventType,
      eventDate: form.eventDate,
      guestCount: form.guestCount,
      budget: form.budget,
      message: form.message,
      requestedAt: new Date().toISOString(),
    });
    setLoading(false);
    setToast({ msg: L(T.quoteSent, lang), type:"success" });
    setTimeout(()=>setToast(null), 3000);
  };

  if (!provider) return null;
  return (
    <div style={{ padding:"32px", maxWidth:800, margin:"0 auto" }}>
      {toast && <Toast msg={toast.msg} type={toast.type} />}
      <button onClick={()=>setPage("providers")} style={{ background:"none", color:C.textMuted, fontSize:13, marginBottom:24, padding:0 }}>← {L(T.back,lang)}</button>
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:20, padding:32, marginBottom:24 }}>
        <div style={{ display:"flex", gap:20, alignItems:"center", marginBottom:20 }}>
          <div style={{ fontSize:56 }}>{provider.avatar}</div>
          <div>
            <div style={{ fontSize:28, fontFamily:"'Cormorant Garamond',serif", fontWeight:700 }}>{provider.name}</div>
            <div style={{ color:C.accent, fontSize:14 }}>{provider.type} · {provider.location}</div>
            <div style={{ color:C.textMuted, fontSize:13, marginTop:4 }}>⭐ {provider.rating} ({provider.reviews} reviews) · {provider.price}</div>
          </div>
        </div>
        <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
          {provider.tags.map(t=>(
            <span key={t} style={{ padding:"5px 14px", background:C.accentDim, border:`1px solid ${C.accent}40`, borderRadius:14, fontSize:12, color:C.accent }}>{t}</span>
          ))}
        </div>
      </div>

      {/* Quote Request Form */}
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:20, padding:32 }}>
        <div style={{ fontSize:20, fontFamily:"'Cormorant Garamond',serif", fontWeight:700, marginBottom:24 }}>
          {L(T.requestQuote,lang)}
        </div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:16 }}>
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            <label style={{ fontSize:12, color:C.textMuted, fontWeight:500, letterSpacing:"0.05em", textTransform:"uppercase" }}>{L(T.eventType,lang)}</label>
            <select value={form.eventType} onChange={e=>u("eventType",e.target.value)}
              style={{ padding:"12px 16px", background:C.surfaceHi, border:`1px solid ${C.border}`, borderRadius:10, color:form.eventType?C.text:C.textMuted, fontSize:14 }}>
              <option value="">{L({en:"Select",ar:"اختر"},lang)}</option>
              {EVENT_TYPES.map(e=><option key={e.en} value={e.en}>{lang==="ar"?e.ar:e.en}</option>)}
            </select>
          </div>
          <Input label={L(T.eventDate,lang)} value={form.eventDate} onChange={e=>u("eventDate",e.target.value)} type="date" />
          <Input label={L(T.guests,lang)} value={form.guestCount} onChange={e=>u("guestCount",e.target.value)} icon="👥" />
          <Input label={L(T.budget,lang)} value={form.budget} onChange={e=>u("budget",e.target.value)} icon="💰" />
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:6, marginBottom:20 }}>
          <label style={{ fontSize:12, color:C.textMuted, fontWeight:500, letterSpacing:"0.05em", textTransform:"uppercase" }}>{L(T.notes,lang)}</label>
          <textarea value={form.message} onChange={e=>u("message",e.target.value)} rows={3}
            style={{ padding:"12px 16px", background:C.surfaceHi, border:`1px solid ${C.border}`, borderRadius:10, color:C.text, fontSize:14, resize:"vertical" }} />
        </div>
        <Btn onClick={sendQuote} loading={loading} style={{ width:"100%", padding:"15px" }}>{L(T.requestQuote,lang)}</Btn>
      </div>
    </div>
  );
}

function CreateEventPage({ setPage, user }) {
  const { lang } = useLang();
  const [step,setStep] = useState(1);
  const [form,setForm] = useState({ eventType:"", eventName:"", date:"", guests:"", budget:"", notes:"" });
  const [loading,setLoading] = useState(false);
  const [toast,setToast] = useState(null);
  const u = (k,v) => setForm(f=>({...f,[k]:v}));

  const create = async () => {
    setLoading(true);
    await triggerWebhook(WEBHOOKS.eventStatus, {
      userName: user?.name || "Guest",
      userEmail: user?.email || "",
      userPhone: user?.phone || "",
      eventName: form.eventName,
      eventType: form.eventType,
      eventDate: form.date,
      previousStatus: "None",
      newStatus: "Event Created",
      notes: form.notes,
      updatedAt: new Date().toISOString(),
    });
    setLoading(false);
    setToast({ msg: L({en:"Event created successfully!",ar:"تم إنشاء المناسبة بنجاح!"},lang), type:"success" });
    setTimeout(()=>setPage("my-events"), 1500);
  };

  return (
    <div style={{ padding:32, maxWidth:600, margin:"0 auto" }}>
      {toast && <Toast msg={toast.msg} type={toast.type} />}
      <div style={{ fontSize:28, fontFamily:"'Cormorant Garamond',serif", fontWeight:700, marginBottom:8 }}>{L(T.createEvent,lang)}</div>
      <div style={{ display:"flex", gap:8, marginBottom:32 }}>
        {[1,2,3].map(s=>(
          <div key={s} style={{ flex:1, height:3, borderRadius:2, background:s<=step?C.accent:C.border, transition:"background 0.3s" }} />
        ))}
      </div>

      {step===1 && (
        <div>
          <div style={{ fontSize:16, fontWeight:600, marginBottom:16 }}>{L({en:"What type of event?",ar:"ما نوع المناسبة؟"},lang)}</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:12, marginBottom:24 }}>
            {EVENT_TYPES.map(e=>(
              <div key={e.en} onClick={()=>u("eventType",e.en)}
                style={{ padding:"16px 8px", background: form.eventType===e.en ? C.accentDim : C.surface,
                  border:`1px solid ${form.eventType===e.en ? C.accent : C.border}`, borderRadius:12, textAlign:"center", cursor:"pointer", transition:"all 0.2s" }}>
                <div style={{ fontSize:24, marginBottom:6 }}>{e.icon}</div>
                <div style={{ fontSize:11, fontWeight:500 }}>{lang==="ar"?e.ar:e.en}</div>
              </div>
            ))}
          </div>
          <Btn onClick={()=>setStep(2)} disabled={!form.eventType} style={{ width:"100%", padding:"15px" }}>{L(T.next,lang)}</Btn>
        </div>
      )}

      {step===2 && (
        <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
          <Input label={L({en:"Event Name",ar:"اسم المناسبة"},lang)} value={form.eventName} onChange={e=>u("eventName",e.target.value)} icon="✨" />
          <Input label={L(T.eventDate,lang)} value={form.date} onChange={e=>u("date",e.target.value)} type="date" />
          <Input label={L(T.guests,lang)} value={form.guests} onChange={e=>u("guests",e.target.value)} icon="👥" placeholder={L({en:"e.g. 200",ar:"مثال: ٢٠٠"},lang)} />
          <Input label={L(T.budget,lang)} value={form.budget} onChange={e=>u("budget",e.target.value)} icon="💰" placeholder={L({en:"e.g. 150,000",ar:"مثال: ١٥٠,٠٠٠"},lang)} />
          <div style={{ display:"flex", gap:12 }}>
            <Btn onClick={()=>setStep(1)} variant="ghost" style={{ flex:1, padding:"15px" }}>{L(T.back,lang)}</Btn>
            <Btn onClick={()=>setStep(3)} style={{ flex:2, padding:"15px" }}>{L(T.next,lang)}</Btn>
          </div>
        </div>
      )}

      {step===3 && (
        <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            <label style={{ fontSize:12, color:C.textMuted, fontWeight:500, letterSpacing:"0.05em", textTransform:"uppercase" }}>{L(T.notes,lang)}</label>
            <textarea value={form.notes} onChange={e=>u("notes",e.target.value)} rows={4}
              placeholder={L({en:"Any special requirements...",ar:"أي متطلبات خاصة..."},lang)}
              style={{ padding:"12px 16px", background:C.surfaceHi, border:`1px solid ${C.border}`, borderRadius:10, color:C.text, fontSize:14, resize:"vertical" }} />
          </div>
          {/* Summary */}
          <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:14, padding:20 }}>
            <div style={{ fontSize:13, fontWeight:600, marginBottom:12, color:C.textMuted }}>{L({en:"Event Summary",ar:"ملخص المناسبة"},lang)}</div>
            {[["Type",form.eventType],["Date",form.date],["Guests",form.guests],["Budget",form.budget+" SAR"]].map(([k,v])=>v?(
              <div key={k} style={{ display:"flex", justifyContent:"space-between", padding:"6px 0", borderBottom:`1px solid ${C.border}` }}>
                <span style={{ fontSize:12, color:C.textMuted }}>{k}</span>
                <span style={{ fontSize:13, fontWeight:500 }}>{v}</span>
              </div>
            ):null)}
          </div>
          <div style={{ display:"flex", gap:12 }}>
            <Btn onClick={()=>setStep(2)} variant="ghost" style={{ flex:1, padding:"15px" }}>{L(T.back,lang)}</Btn>
            <Btn onClick={create} loading={loading} style={{ flex:2, padding:"15px" }}>{L(T.createEventBtn,lang)}</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

