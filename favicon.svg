function ProvidersPage({ setPage, setSelectedProvider }) {
  const { lang } = useLang();
  const [filter,setFilter] = useState("All");
  const types = ["All","Venue","Photography","Catering","Flowers","Entertainment","Bakery","Decoration","Videography"];
  const filtered = PROVIDERS.filter(p => filter==="All" || p.type===filter);
  return (
    <div style={{ padding:32 }}>
      <div style={{ fontSize:28, fontFamily:"'Cormorant Garamond',serif", fontWeight:700, marginBottom:20 }}>{L(T.providers,lang)}</div>
      <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginBottom:28 }}>
        {types.map(t=>(
          <div key={t} onClick={()=>setFilter(t)}
            style={{ padding:"8px 18px", borderRadius:20, fontSize:13, fontWeight:500, cursor:"pointer", transition:"all 0.2s",
              background: filter===t ? C.accent : C.surface,
              color: filter===t ? "#0a0a0f" : C.textMuted,
              border:`1px solid ${filter===t ? C.accent : C.border}` }}>
            {t}
          </div>
        ))}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))", gap:20 }}>
        {filtered.map(p=>(
          <div key={p.id} onClick={()=>{setSelectedProvider(p);setPage("provider-detail");}}
            style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:16, padding:20, cursor:"pointer", transition:"all 0.2s" }}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=C.accent;e.currentTarget.style.transform="translateY(-2px)";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.transform="none";}}>
            <div style={{ fontSize:36, marginBottom:12 }}>{p.avatar}</div>
            <div style={{ fontWeight:600, fontSize:16, marginBottom:4 }}>{p.name}</div>
            <div style={{ fontSize:12, color:C.accent, marginBottom:8 }}>{p.type} · {p.location}</div>
            <div style={{ fontSize:13, color:C.textMuted, marginBottom:12 }}>⭐ {p.rating} ({p.reviews}) · {p.price}</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
              {p.tags.map(tg=>(
                <span key={tg} style={{ padding:"3px 10px", background:C.surfaceHi, borderRadius:12, fontSize:11, color:C.textMuted }}>{tg}</span>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════
   ROOT APP
   ═══════════════════════════════════ */
export default function App() {
  const [lang, setLang] = useState("en");
  const [screen, setScreen] = useState("welcome"); // welcome | signin | role | user-reg | supplier-reg
  const [page, setPage] = useState("home");
  const [user, setUser] = useState(null);
  const [selectedProvider, setSelectedProvider] = useState(null);
  const [showProfileMenu, setShowProfileMenu] = useState(false);

  const isRTL = lang === "ar";

  const handleSuccess = (u) => { setUser(u); setScreen("app"); };

  const navItems = user?.role === "supplier"
    ? [
        {id:"dashboard",label:L(T.dashboard,lang),icon:"📊"},
        {id:"providers",label:L(T.providers,lang),icon:"🏢"},
        {id:"home",label:L(T.explore,lang),icon:"✨"},
      ]
    : [
        {id:"home",label:L(T.explore,lang),icon:"✨"},
        {id:"providers",label:L(T.providers,lang),icon:"🏢"},
        {id:"create",label:L(T.createEvent,lang),icon:"➕"},
        {id:"my-events",label:L(T.myEvents,lang),icon:"📋"},
      ];

  return (
    <LangCtx.Provider value={{ lang, setLang }}>
      <style>{GS}</style>
      <div dir={isRTL ? "rtl" : "ltr"} style={{ fontFamily: isRTL ? "'Noto Kufi Arabic',sans-serif" : "'DM Sans',sans-serif" }}>

        {/* Lang toggle always visible */}
        <button onClick={()=>setLang(l=>l==="en"?"ar":"en")}
          style={{ position:"fixed", top:16, right:16, zIndex:1000, background:C.surface, border:`1px solid ${C.border}`, borderRadius:10, padding:"8px 14px", color:C.text, fontSize:13, fontWeight:600 }}>
          {lang==="en" ? "العربية" : "English"}
        </button>

        {/* AUTH FLOW */}
        {screen==="welcome" && <WelcomeScreen onSignIn={()=>setScreen("signin")} onRegister={()=>setScreen("role")} />}
        {screen==="signin" && <SignInScreen onBack={()=>setScreen("welcome")} onSuccess={handleSuccess} />}
        {screen==="role" && <RoleSelectScreen onBack={()=>setScreen("welcome")} onSelect={r=>setScreen(r==="user"?"user-reg":"supplier-reg")} />}
        {screen==="user-reg" && <UserRegisterScreen onBack={()=>setScreen("role")} onSuccess={handleSuccess} />}
        {screen==="supplier-reg" && <SupplierRegisterScreen onBack={()=>setScreen("role")} onSuccess={handleSuccess} />}

        {/* MAIN APP */}
        {screen==="app" && (
          <>
            {/* Navbar */}
            <nav style={{ position:"sticky", top:0, zIndex:100, background:`${C.bg}e8`, backdropFilter:"blur(20px)", borderBottom:`1px solid ${C.border}`, padding:"0 32px", display:"flex", alignItems:"center", justifyContent:"space-between", height:64 }}>
              <div style={{ fontSize:22, fontFamily: isRTL ? "'Noto Kufi Arabic',sans-serif" : "'Cormorant Garamond',serif", fontWeight:700, color:C.accent }}>
                {T.brandEn} <span style={{ fontFamily:"'Noto Kufi Arabic',sans-serif", fontSize:18 }}>{T.brandAr}</span>
              </div>
              <div style={{ display:"flex", gap:4 }}>
                {navItems.map(item=>(
                  <button key={item.id} onClick={()=>setPage(item.id)}
                    style={{ padding:"8px 16px", borderRadius:10, background: page===item.id ? C.accentDim : "transparent",
                      color: page===item.id ? C.accent : C.textMuted,
                      fontSize:13, fontWeight:600, display:"flex", alignItems:"center", gap:6, transition:"all 0.2s" }}>
                    <span style={{ fontSize:14 }}>{item.icon}</span><span>{item.label}</span>
                  </button>
                ))}
              </div>
              <div style={{ position:"relative" }}>
                <div onClick={()=>setShowProfileMenu(m=>!m)}
                  style={{ width:38, height:38, borderRadius:12, background:C.accentDim, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", border:`1px solid ${C.accent}40`, fontSize:16 }}>
                  👤
                </div>
                {showProfileMenu && (
                  <div style={{ position:"absolute", right:0, top:46, background:C.surface, border:`1px solid ${C.border}`, borderRadius:14, padding:16, minWidth:200, zIndex:200 }}>
                    <div style={{ fontWeight:600, fontSize:14, marginBottom:2 }}>{user?.businessName || user?.name}</div>
                    <div style={{ fontSize:12, color:C.textMuted, marginBottom:12 }}>{user?.email}</div>
                    {user?.role==="supplier" && <div style={{ fontSize:11, color:C.accent, fontWeight:600, marginBottom:12, padding:"3px 10px", background:C.accentDim, borderRadius:8, display:"inline-block" }}>SUPPLIER</div>}
                    <div onClick={()=>{ setUser(null); setScreen("welcome"); setShowProfileMenu(false); }}
                      style={{ fontSize:13, color:C.error, cursor:"pointer", padding:"8px 0", borderTop:`1px solid ${C.border}`, marginTop:4 }}>
                      {L(T.signOut,lang)}
                    </div>
                  </div>
                )}
              </div>
            </nav>
            {showProfileMenu && <div onClick={()=>setShowProfileMenu(false)} style={{ position:"fixed", inset:0, zIndex:99 }} />}

            {/* Pages */}
            <div style={{ position:"relative", zIndex:1 }}>
              {page==="home" && <HomePage setPage={setPage} setSelectedProvider={setSelectedProvider} />}
              {page==="providers" && <ProvidersPage setPage={setPage} setSelectedProvider={setSelectedProvider} />}
              {page==="provider-detail" && <ProviderDetailPage provider={selectedProvider} setPage={setPage} user={user} />}
              {page==="create" && <CreateEventPage setPage={setPage} user={user} />}
              {page==="my-events" && <MyEventsPage setPage={setPage} />}
              {page==="dashboard" && <SupplierDashboard user={user} />}
            </div>
          </>
        )}
      </div>
    </LangCtx.Provider>
  );
}
