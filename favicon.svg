function WelcomeScreen({ onSignIn, onRegister }) {
  const { lang } = useLang();
  return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:24, background:`radial-gradient(ellipse at 50% 0%, ${C.accentDim} 0%, ${C.bg} 60%)` }}>
      <div style={{ textAlign:"center", marginBottom:48, animation:"fadeUp 0.6s ease" }}>
        <div style={{ fontSize:56, fontFamily:"'Cormorant Garamond',serif", fontWeight:700, color:C.accent, lineHeight:1 }}>
          {T.brandEn} <span style={{ fontFamily:"'Noto Kufi Arabic',sans-serif" }}>{T.brandAr}</span>
        </div>
        <div style={{ fontSize:15, color:C.textMuted, marginTop:10 }}>{L(T.tagline,lang)}</div>
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:14, width:"100%", maxWidth:360 }}>
        <Btn onClick={onSignIn} style={{ width:"100%", padding:"16px" }}>{L(T.signIn,lang)}</Btn>
        <Btn onClick={onRegister} variant="ghost" style={{ width:"100%", padding:"16px" }}>{L(T.createAccount,lang)}</Btn>
      </div>
    </div>
  );
}

function SignInScreen({ onBack, onSuccess }) {
  const { lang } = useLang();
  const [email,setEmail] = useState("");
  const [pass,setPass] = useState("");
  const [loading,setLoading] = useState(false);

  const handle = async () => {
    setLoading(true);
    await new Promise(r=>setTimeout(r,600));
    setLoading(false);
    onSuccess({ name:"Demo User", email, role:"user" });
  };

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
      <div style={{ width:"100%", maxWidth:420, animation:"fadeUp 0.5s ease" }}>
        <button onClick={onBack} style={{ background:"none", color:C.textMuted, fontSize:13, marginBottom:32, padding:0 }}>← {L(T.back,lang)}</button>
        <div style={{ fontSize:32, fontFamily:"'Cormorant Garamond',serif", fontWeight:700, marginBottom:6 }}>{L(T.welcomeBack,lang)}</div>
        <div style={{ fontSize:14, color:C.textMuted, marginBottom:32 }}>{L(T.signInSubtitle,lang)}</div>
        <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
          <Input label={L(T.email,lang)} value={email} onChange={e=>setEmail(e.target.value)} type="email" icon="✉️" />
          <Input label={L(T.password,lang)} value={pass} onChange={e=>setPass(e.target.value)} type="password" icon="🔒" />
          <div style={{ textAlign:"right" }}><span style={{ fontSize:12, color:C.accent, cursor:"pointer" }}>{L(T.forgotPassword,lang)}</span></div>
          <Btn onClick={handle} loading={loading} style={{ width:"100%", marginTop:8, padding:"15px" }}>{L(T.signIn,lang)}</Btn>
          <div style={{ textAlign:"center", fontSize:13, color:C.textMuted }}>
            {L(T.noAccount,lang)} <span onClick={onBack} style={{ color:C.accent, cursor:"pointer" }}>{L(T.register,lang)}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

